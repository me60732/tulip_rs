name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tulip_rs (all features)
        run: cargo build --manifest-path tulip_rs/Cargo.toml --all-features

      - name: Test tulip_rs
        run: cargo test --manifest-path tulip_rs/Cargo.toml --all-features

      - name: Build tulip_test (incl. benchmarks)
        run: cargo build --manifest-path tulip_test/Cargo.toml --benches

      - name: Test tulip_test
        run: cargo test --manifest-path tulip_test/Cargo.toml
