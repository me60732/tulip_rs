name: Publish to crates.io

on:
    push:
        tags:
            - "v*.*.*"
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly

            - name: Publish tulip_rs_shared
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIOTULIP }}
              run: cargo publish --manifest-path tulip_rs_shared/Cargo.toml --verbose
              continue-on-error: true
               
            - name: Wait for tulip_rs_shared to be indexed
              run: sleep 30

            - name: Publish tulip_rs_macros
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIOTULIP }}
              run: cargo publish --manifest-path tulip_rs_macros/Cargo.toml --verbose
              continue-on-error: true
              
            - name: Wait for tulip_rs_macros to be indexed
              run: sleep 30

            - name: Publish tulip_rs
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIOTULIP }}
              run: cargo publish --manifest-path tulip_rs/Cargo.toml --verbose
