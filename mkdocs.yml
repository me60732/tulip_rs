site_name: TulipRS
site_description: High-performance technical analysis library in Rust — 100+ indicators, 60+ candlestick patterns, SIMD acceleration
site_url: https://me60732.github.io/tulip_rs
repo_url: https://github.com/me60732/tulip_rs
repo_name: me60732/tulip_rs

theme:
    name: material
    palette:
        - scheme: slate
          primary: teal
          accent: teal
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
        - scheme: default
          primary: teal
          accent: teal
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
    features:
        - content.tabs.link
        - content.code.copy
        - content.code.annotate
        - navigation.tabs
        - navigation.top
        - search.highlight

markdown_extensions:
    - admonition
    - attr_list
    - pymdownx.superfences
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.details
    - tables
    - toc:
          permalink: true

