site_name: TulipRS
site_description: High-performance technical analysis library in Rust — 100+ indicators, 60+ candlestick patterns, SIMD acceleration
site_url: https://me60732.github.io/tulip_rs
repo_url: https://github.com/me60732/tulip_rs
repo_name: me60732/tulip_rs

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Indicators:
    - Overview: indicators/index.md
    - Moving Averages: indicators/moving_averages.md
    - Oscillators: indicators/oscillators.md
    - Trend: indicators/trend.md
    - Volatility: indicators/volatility.md
    - Volume: indicators/volume.md
    - Price & Statistical: indicators/price_statistical.md
  - Candlestick Patterns: candlestick_patterns.md
  - SIMD: simd.md
  - State Management: state_management.md
  - Language Bindings: language_bindings.md
  - Benchmarks: benchmarks.md

docs_dir: docs
